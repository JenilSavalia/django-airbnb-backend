<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 — Forbidden</title>
  <style>
    :root {
      --brand: #FF385C;
      --brand-dark: #E31C5F;
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #222222;
      --muted: #717171;
      --border: #ebebeb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --card: #1e1e1e;
        --text: #f7f7f7;
        --muted: #a0a0a0;
        --border: #2c2c2c;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }
    .code {
      margin: 0;
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--brand);
    }
    h1 {
      margin: 16px 0 8px;
      font-size: 24px;
      font-weight: 600;
    }
    p.msg {
      margin: 0 0 28px;
      font-size: 16px;
      line-height: 1.5;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-primary {
      background: var(--brand);
      color: #fff;
    }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { border-color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">403</p>
    <h1>Access forbidden</h1>
    <p class="msg">You don't have permission to access this resource. Try signing in with an account that has access.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Go home</a>
      <a class="btn btn-secondary" href="#" onclick="history.back();return false;">Go back</a>
    </div>
  </main>
</body>
</html>
